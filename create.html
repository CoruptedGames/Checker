<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checker — Create</title>
  <style>
    :root{
      --bg1:#08080b;
      --bg2:#12131a;
      --glass: rgba(255,255,255,0.08);
      --glass-strong: rgba(255,255,255,0.12);
      --stroke: rgba(255,255,255,0.16);
      --text:#fff6ea;
      --muted: rgba(255,246,234,0.72);
      --accent:#ffb347;
      --accent2:#ff8a1f;
      --danger:#ff6b57;
      --shadow: 0 30px 90px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,179,71,.16), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(255,138,31,.13), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255,179,71,.12), transparent 32%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      width:380px;
      height:380px;
      border-radius:50%;
      filter: blur(60px);
      opacity:.22;
      z-index:0;
      animation: float 10s ease-in-out infinite;
      pointer-events:none;
    }

    body::before{
      top:-120px;
      left:-120px;
      background: rgba(255,179,71,.75);
    }

    body::after{
      right:-120px;
      bottom:-120px;
      background: rgba(255,138,31,.65);
      animation-delay:-4s;
    }

    @keyframes float{
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px, 14px) scale(1.08); }
    }

    .shell{
      position:relative;
      z-index:1;
      min-height:100vh;
      padding:28px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card{
      width:min(1100px, 100%);
      background:var(--glass);
      border:1px solid var(--stroke);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:24px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-mark{
      width:46px;
      height:46px;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-weight:800;
      color:#fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 30px rgba(255, 158, 56, .35);
      flex:0 0 auto;
    }

    .brand h1{
      margin:0;
      font-size:1.65rem;
      letter-spacing:.4px;
    }

    .brand p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:.95rem;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button, .btn{
      border:none;
      outline:none;
      border-radius:16px;
      padding:12px 16px;
      color:var(--text);
      background:var(--glass-strong);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      cursor:pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
      font-weight:600;
    }

    button:hover, .btn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,179,71,.45);
      box-shadow: 0 16px 28px rgba(0,0,0,.24);
    }

    button:active, .btn:active{
      transform: translateY(0);
    }

    .primary{
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#fff;
      border-color: transparent;
    }

    .ghost{
      background: rgba(255,255,255,.06);
    }

    .danger{
      background: rgba(255,107,87,.14);
      border-color: rgba(255,107,87,.28);
      color:#ffdcd6;
    }

    .hero{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:18px;
      align-items:stretch;
    }

    .panel{
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      padding:22px;
    }

    .panel h2{
      margin:0 0 10px;
      font-size:1.25rem;
    }

    .panel p{
      margin:0;
      color:var(--muted);
      line-height:1.65;
    }

    .input-row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    input[type="text"]{
      flex:1 1 250px;
      border:none;
      outline:none;
      border-radius:16px;
      padding:14px 16px;
      color:var(--text);
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    input[type="text"]::placeholder{
      color:rgba(255,246,234,.45);
    }

    .list{
      display:grid;
      gap:12px;
      margin-top:18px;
    }

    .item{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      border-radius:18px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
    }

    .item-name{
      flex:1;
      font-size:1.02rem;
      word-break:break-word;
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .empty{
      text-align:center;
      padding:34px 16px;
      color:var(--muted);
      border:1px dashed rgba(255,255,255,.16);
      border-radius:18px;
      background: rgba(255,255,255,.03);
    }

    .footer-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .small{
      margin-top:12px;
      font-size:.94rem;
      color:var(--muted);
      line-height:1.6;
    }

    @media (max-width: 820px){
      .hero{
        grid-template-columns:1fr;
      }
      .card{
        padding:18px;
      }
      .brand h1{
        font-size:1.45rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="topbar">
        <div class="brand">
          <div class="brand-mark">✓</div>
          <div>
            <h1>CHECKER</h1>
            <p>Create a new checklist draft</p>
          </div>
        </div>

        <div class="nav">
          <button class="ghost" onclick="location.href='index.html'">Home</button>
          <button class="ghost" onclick="location.href='create.html'">Create</button>
          <button class="ghost" onclick="location.href='checklist.html'">Checklist</button>
        </div>
      </div>

      <div class="hero">
        <section class="panel">
          <h2>Add items</h2>
          <p>Type a name and click Add New, or press Enter.</p>

          <div class="input-row">
            <input type="text" id="itemInput" placeholder="Milk, Bread, Eggs..." />
            <button class="primary" id="addButton">Add New</button>
          </div>

          <div class="list" id="itemList"></div>
        </section>

        <section class="panel">
          <h2>Finish draft</h2>
          <p>
            Confirm exports a <strong>.json</strong> file and opens the checklist page.
            Your draft is also kept in the browser.
          </p>

          <div class="footer-actions">
            <button class="primary" id="confirmButton">Confirm & Export JSON</button>
            <button class="ghost" onclick="location.href='index.html'">Back to Home</button>
          </div>

          <div class="small">
            Use Edit to rename an item and Delete to remove it before confirming.
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const DRAFT_KEY = "checker_draft";
    const CURRENT_KEY = "checker_current";

    let items = [];

    function normalizeItems(data) {
      if (!Array.isArray(data)) return [];
      return data
        .map(item => ({
          name: String(item?.name ?? "").trim(),
          checked: Boolean(item?.checked)
        }))
        .filter(item => item.name.length > 0);
    }

    function loadDraft() {
      try {
        const raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) return [];
        return normalizeItems(JSON.parse(raw));
      } catch {
        return [];
      }
    }

    function saveDraft() {
      localStorage.setItem(DRAFT_KEY, JSON.stringify(items));
    }

    function downloadJSON(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    }

    function renderItems() {
      const list = document.getElementById("itemList");
      list.innerHTML = "";

      if (!items.length) {
        list.innerHTML = `<div class="empty">No items yet. Add your first one on the left.</div>`;
        return;
      }

      items.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "item";

        const dot = document.createElement("div");
        dot.style.width = "12px";
        dot.style.height = "12px";
        dot.style.borderRadius = "50%";
        dot.style.background = "linear-gradient(135deg, #ffb347, #ff8a1f)";
        dot.style.boxShadow = "0 0 18px rgba(255,179,71,.35)";

        const name = document.createElement("div");
        name.className = "item-name";
        name.textContent = item.name;

        const actions = document.createElement("div");
        actions.className = "item-actions";

        const editButton = document.createElement("button");
        editButton.className = "ghost";
        editButton.textContent = "Edit";
        editButton.onclick = function () {
          const newName = prompt("Rename item:", item.name);
          const trimmed = newName ? newName.trim() : "";
          if (!trimmed) return;
          items[index].name = trimmed;
          saveDraft();
          renderItems();
        };

        const deleteButton = document.createElement("button");
        deleteButton.className = "danger";
        deleteButton.textContent = "Delete";
        deleteButton.onclick = function () {
          items.splice(index, 1);
          saveDraft();
          renderItems();
        };

        actions.appendChild(editButton);
        actions.appendChild(deleteButton);

        row.appendChild(dot);
        row.appendChild(name);
        row.appendChild(actions);

        list.appendChild(row);
      });
    }

    function addItem() {
      const input = document.getElementById("itemInput");
      const name = input.value.trim();
      if (!name) return;

      items.push({ name, checked: false });
      input.value = "";
      saveDraft();
      renderItems();
      input.focus();
    }

    document.getElementById("addButton").onclick = addItem;

    document.getElementById("itemInput").addEventListener("keydown", function (event) {
      if (event.key === "Enter") addItem();
    });

    document.getElementById("confirmButton").onclick = function () {
      if (!items.length) {
        alert("Add at least one item first.");
        return;
      }

      localStorage.setItem(CURRENT_KEY, JSON.stringify(items));
      localStorage.setItem(DRAFT_KEY, JSON.stringify(items));

      downloadJSON("checker.json", items);

      setTimeout(() => {
        location.href = "checklist.html";
      }, 250);
    };

    items = loadDraft();
    renderItems();
  </script>
</body>
</html>
