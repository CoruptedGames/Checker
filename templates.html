<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskMaster - Templates</title>
  <style>
    :root{
      --bg1:#08080b;
      --bg2:#12131a;
      --glass: rgba(255,255,255,0.08);
      --glass-strong: rgba(255,255,255,0.12);
      --stroke: rgba(255,255,255,0.16);
      --text:#fff6ea;
      --muted: rgba(255,246,234,0.72);
      --accent:#ffb347;
      --accent2:#ff8a1f;
      --danger:#ff6b57;
      --shadow: 0 30px 90px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      font-family: 'Segoe UI', Trebuchet MS, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,179,71,.16), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(255,138,31,.13), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255,179,71,.12), transparent 32%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      width:380px;
      height:380px;
      border-radius:50%;
      filter: blur(60px);
      opacity:.22;
      z-index:0;
      animation: float 10s ease-in-out infinite;
      pointer-events:none;
    }

    body::before{
      top:-120px;
      left:-120px;
      background: rgba(255,179,71,.75);
    }

    body::after{
      right:-120px;
      bottom:-120px;
      background: rgba(255,138,31,.65);
      animation-delay:-4s;
    }

    @keyframes float{
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px, 14px) scale(1.08); }
    }

    .shell{
      position:relative;
      z-index:1;
      min-height:100vh;
      padding:28px;
    }

    .card{
      max-width:1200px;
      margin:0 auto;
      background:var(--glass);
      border:1px solid var(--stroke);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:24px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:28px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-mark{
      width:46px;
      height:46px;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-weight:800;
      color:#fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 30px rgba(255, 158, 56, .35);
      flex:0 0 auto;
    }

    .brand h1{
      margin:0;
      font-size:1.65rem;
      letter-spacing:.4px;
    }

    .brand p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:.95rem;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button, .btn{
      border:none;
      outline:none;
      border-radius:16px;
      padding:12px 16px;
      color:var(--text);
      background:var(--glass-strong);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      cursor:pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
      font-weight:600;
    }

    button:hover, .btn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,179,71,.45);
      box-shadow: 0 16px 28px rgba(0,0,0,.24);
    }

    button:active, .btn:active{
      transform: translateY(0);
    }

    .primary{
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#fff;
      border-color: transparent;
    }

    .ghost{
      background: rgba(255,255,255,.06);
    }

    h2{
      margin:0 0 20px;
      font-size:1.4rem;
    }

    .templates-grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap:16px;
    }

    .template-card{
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:20px;
      padding:20px;
      transition: all .3s ease;
      cursor:pointer;
    }

    .template-card:hover{
      background: rgba(255,255,255,.08);
      border-color: rgba(255,179,71,.4);
      transform: translateY(-4px);
    }

    .template-header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .template-icon{
      font-size:2rem;
      width:50px;
      height:50px;
      display:grid;
      place-items:center;
      background: rgba(255,179,71,.15);
      border-radius:12px;
    }

    .template-title{
      font-size:1.15rem;
      font-weight:700;
    }

    .template-desc{
      color:var(--muted);
      font-size:.95rem;
      margin:0 0 12px;
      line-height:1.5;
    }

    .template-categories{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-bottom:12px;
    }

    .category-tag{
      background: rgba(255,179,71,.1);
      border:1px solid rgba(255,179,71,.2);
      border-radius:8px;
      padding:4px 10px;
      font-size:.85rem;
      color:var(--muted);
    }

    .template-actions{
      display:flex;
      gap:8px;
      width:100%;
    }

    .template-actions button{
      flex:1;
      padding:10px 12px;
      font-size:.9rem;
    }

    .hero{
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:32px;
      margin-bottom:28px;
      text-align:center;
    }

    .hero h2{
      font-size:1.8rem;
      margin-bottom:12px;
    }

    .hero p{
      color:var(--muted);
      font-size:1.05rem;
      max-width:600px;
      margin:0 auto 20px;
    }

    @media (max-width: 768px){
      .templates-grid{
        grid-template-columns: 1fr;
      }
      .card{
        padding:18px;
      }
      .brand h1{
        font-size:1.45rem;
      }
      .hero{
        padding:20px;
      }
    }
  </style>
</head>

    function useTemplate(template) {
      const data = { branches: template.categories };
      localStorage.setItem(CURRENT_KEY, JSON.stringify(data));
      localStorage.setItem(DRAFT_KEY, JSON.stringify(data));
      location.href = "checklist.html";
    }

    function renderTemplates() {
      const grid = document.getElementById("templatesGrid");
      grid.innerHTML = "";

      templates.forEach((template, index) => {
        const card = document.createElement("div");
        card.className = "template-card";

        const header = document.createElement("div");
        header.className = "template-header";

        const icon = document.createElement("div");
        icon.className = "template-icon";
        icon.textContent = template.icon;

        const title = document.createElement("div");
        title.className = "template-title";
        title.textContent = template.name;

        header.appendChild(icon);
        header.appendChild(title);
        card.appendChild(header);

        const desc = document.createElement("p");
        desc.className = "template-desc";
        desc.textContent = template.description;
        card.appendChild(desc);

        const categories = document.createElement("div");
        categories.className = "template-categories";
        template.categories.slice(0, 3).forEach(cat => {
          const tag = document.createElement("span");
          tag.className = "category-tag";
          tag.textContent = cat.name;
          categories.appendChild(tag);
        });
        if (template.categories.length > 3) {
          const more = document.createElement("span");
          more.className = "category-tag";
          more.textContent = `+${template.categories.length - 3} more`;
          categories.appendChild(more);
        }
        card.appendChild(categories);

        const actions = document.createElement("div");
        actions.className = "template-actions";

        const useBtn = document.createElement("button");
        useBtn.className = "primary";
        useBtn.textContent = "Use Template";
        useBtn.onclick = () => useTemplate(template);

        const previewBtn = document.createElement("button");
        previewBtn.className = "ghost";
        previewBtn.textContent = "Preview";
        previewBtn.onclick = () => alert(`${template.name}\n\nCategories:\n${template.categories.map(c => `• ${c.name} (${c.items.length} tasks)`).join("\n")}`);

        actions.appendChild(useBtn);
        actions.appendChild(previewBtn);
        card.appendChild(actions);

        grid.appendChild(card);
      });
    }

    renderTemplates();
