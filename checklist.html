<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskMaster - Checklist</title>
  <style>
    :root{
      --bg1:#08080b;
      --bg2:#12131a;
      --glass: rgba(255,255,255,0.08);
      --glass-strong: rgba(255,255,255,0.12);
      --stroke: rgba(255,255,255,0.16);
      --text:#fff6ea;
      --muted: rgba(255,246,234,0.72);
      --accent:#ffb347;
      --accent2:#ff8a1f;
      --danger:#ff6b57;
      --success:#4ade80;
      --shadow: 0 30px 90px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      font-family: 'Segoe UI', Trebuchet MS, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,179,71,.16), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(255,138,31,.13), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255,179,71,.12), transparent 32%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      width:380px;
      height:380px;
      border-radius:50%;
      filter: blur(60px);
      opacity:.22;
      z-index:0;
      animation: float 10s ease-in-out infinite;
      pointer-events:none;
    }

    body::before{
      top:-120px;
      left:-120px;
      background: rgba(255,179,71,.75);
    }

    body::after{
      right:-120px;
      bottom:-120px;
      background: rgba(255,138,31,.65);
      animation-delay:-4s;
    }

    @keyframes float{
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px, 14px) scale(1.08); }
    }

    .shell{
      position:relative;
      z-index:1;
      min-height:100vh;
      padding:28px;
      display:flex;
      align-items:flex-start;
      justify-content:center;
    }

    .card{
      width:min(1200px, 100%);
      background:var(--glass);
      border:1px solid var(--stroke);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:24px;
      max-height:90vh;
      overflow-y:auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-mark{
      width:46px;
      height:46px;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-weight:800;
      color:#fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 30px rgba(255, 158, 56, .35);
      flex:0 0 auto;
    }

    .brand h1{
      margin:0;
      font-size:1.65rem;
      letter-spacing:.4px;
    }

    .brand p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:.95rem;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button, .btn{
      border:none;
      outline:none;
      border-radius:16px;
      padding:12px 16px;
      color:var(--text);
      background:var(--glass-strong);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      cursor:pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
      font-weight:600;
      font-size:.95rem;
    }

    button:hover, .btn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,179,71,.45);
      box-shadow: 0 16px 28px rgba(0,0,0,.24);
    }

    button:active, .btn:active{
      transform: translateY(0);
    }

    .primary{
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#fff;
      border-color: transparent;
    }

    .ghost{
      background: rgba(255,255,255,.06);
    }

    .danger{
      background: rgba(255,107,87,.14);
      border-color: rgba(255,107,87,.28);
      color:#ffdcd6;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 300px;
      gap:18px;
      align-items:start;
    }

    .panel{
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      padding:22px;
    }

    .panel h2{
      margin:0 0 10px;
      font-size:1.25rem;
    }

    .panel p{
      margin:0;
      color:var(--muted);
      line-height:1.65;
    }

    .list{
      display:grid;
      gap:12px;
      margin-top:18px;
    }

    .category{
      border:1px solid rgba(255,255,255,.1);
      border-radius:20px;
      padding:16px;
      background: rgba(255,255,255,.035);
      margin-bottom:14px;
    }

    .category-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .category-title{
      font-size:1.05rem;
      font-weight:800;
      letter-spacing:.2px;
    }

    .category-progress{
      font-size:.9rem;
      color:var(--muted);
    }

    .progress-bar{
      height:6px;
      border-radius:6px;
      background: rgba(255,255,255,.08);
      overflow:hidden;
      margin:8px 0;
    }

    .progress-fill{
      height:100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      transition: width .25s ease;
    }

    .category-items{
      display:grid;
      gap:10px;
    }

    .item{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      border-radius:18px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
      transition: opacity .2s;
    }

    .item.done{
      opacity:.6;
    }

    .item.done .item-name{
      text-decoration: line-through;
    }

    .item-content{
      flex:1;
    }

    .item-name{
      font-size:1.02rem;
      word-break:break-word;
      font-weight:500;
    }

    .item-notes{
      font-size:.85rem;
      color:var(--muted);
      margin-top:4px;
    }

    .item-priority{
      display:inline-block;
      font-size:.75rem;
      padding:2px 8px;
      border-radius:6px;
      background: rgba(255,179,71,.15);
      margin-top:4px;
    }

    .item-priority.high{
      background: rgba(255,107,87,.15);
      color:#ffdcd6;
    }

    .item-priority.low{
      background: rgba(74,222,128,.15);
      color:#bbf7d0;
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .empty{
      text-align:center;
      padding:34px 16px;
      color:var(--muted);
      border:1px dashed rgba(255,255,255,.16);
      border-radius:18px;
      background: rgba(255,255,255,.03);
    }

    .footer-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .small{
      margin-top:12px;
      font-size:.94rem;
      color:var(--muted);
      line-height:1.6;
    }

    .checkbox{
      width:20px;
      height:20px;
      accent-color: var(--accent);
      cursor:pointer;
      flex:0 0 auto;
    }

    .stat{
      padding:14px;
      border-radius:18px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      margin-bottom:12px;
    }

    .stat .label{
      display:block;
      color:var(--muted);
      font-size:.9rem;
      margin-bottom:6px;
    }

    .stat .value{
      font-size:1.6rem;
      font-weight:800;
    }

    .search-box{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:12px 14px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      color:var(--text);
      margin-bottom:12px;
    }

    .search-box::placeholder{
      color:rgba(255,246,234,.45);
    }

    @media (max-width: 920px){
      .grid{
        grid-template-columns:1fr;
      }
      .card{
        padding:18px;
      }
      .brand h1{
        font-size:1.45rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="topbar">
        <div class="brand">
          <div class="brand-mark">✓</div>
          <div>
            <h1>TaskMaster</h1>
            <p>Manage and track your project tasks</p>
          </div>
        </div>

        <div class="nav">
          <button class="ghost" onclick="location.href='index.html'">Home</button>
          <button class="ghost" onclick="location.href='create.html'">Create</button>
          <button class="ghost" onclick="location.href='checklist.html'">Checklist</button>
          <button class="ghost" onclick="location.href='templates.html'">Templates</button>
        </div>
      </div>

      <div class="grid">
        <section class="panel">
          <h2>Active Project</h2>
          <p>Complete tasks, add notes, and track progress.</p>

          <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search tasks...">

          <div class="list" id="checklistContainer"></div>
        </section>

        <section class="panel">
          <h2>Analytics</h2>

          <div class="stat">
            <span class="label">Overall Progress</span>
            <div class="value" id="overallProgress">0%</div>
          </div>

          <div class="stat">
            <span class="label">Tasks Completed</span>
            <div class="value" id="completedCount">0</div>
          </div>

          <div class="stat">
            <span class="label">Total Tasks</span>
            <div class="value" id="totalCount">0</div>
          </div>

          <div class="stat">
            <span class="label">High Priority</span>
            <div class="value" id="highPriorityCount">0</div>
          </div>

          <div class="footer-actions">
            <button class="primary" id="exportButton" style="width:100%;">💾 Save & Export</button>
            <button class="ghost" onclick="location.href='create.html'" style="width:100%; margin-top:8px;">+ New Project</button>
          </div>

          <div class="small">
            All data saved locally. Export for backup.
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const CURRENT_KEY = "checker_current";
    const DRAFT_KEY = "checker_draft";

    let categories = [];
    let searchTerm = "";

    function normalizeItems(data) {
      if (!Array.isArray(data)) return [];
      return data
        .map(item => ({
          name: String(item?.name ?? "").trim(),
          checked: Boolean(item?.checked),
          notes: String(item?.notes ?? "").trim(),
          priority: String(item?.priority ?? "normal").trim(),
          tags: Array.isArray(item?.tags) ? item.tags : [],
          timestamp: item?.timestamp || Date.now()
        }))
        .filter(item => item.name.length > 0);
    }

    function normalizeData(data) {
      if (Array.isArray(data)) {
        const items = normalizeItems(data);
        return items.length ? [{ name: "General", items }] : [];
      }
      if (data && Array.isArray(data.branches)) {
        return data.branches.map(b => ({
          name: String(b?.name ?? "").trim() || "General",
          items: normalizeItems(b?.items)
        }));
      }
      return [];
    }

    function loadCategories() {
      try {
        const current = localStorage.getItem(CURRENT_KEY);
        if (current) {
          return normalizeData(JSON.parse(current));
        }

        const draft = localStorage.getItem(DRAFT_KEY);
        if (draft) {
          return normalizeData(JSON.parse(draft));
        }
      } catch {
        // ignore
      }
      return [];
    }

    function saveCategories() {
      const data = { branches: categories };
      localStorage.setItem(CURRENT_KEY, JSON.stringify(data));
      localStorage.setItem(DRAFT_KEY, JSON.stringify(data));
    }

    function downloadJSON(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    }

    function updateAnalytics() {
      const totalItems = categories.reduce((sum, c) => sum + c.items.length, 0);
      const completedItems = categories.reduce((sum, c) => sum + c.items.filter(i => i.checked).length, 0);
      const highPriority = categories.reduce((sum, c) => sum + c.items.filter(i => i.priority === 'high').length, 0);

      document.getElementById("completedCount").textContent = completedItems;
      document.getElementById("totalCount").textContent = totalItems;
      document.getElementById("highPriorityCount").textContent = highPriority;
      document.getElementById("overallProgress").textContent = totalItems > 0 ? Math.round((completedItems / totalItems) * 100) + "%" : "0%";
    }

    function renderChecklist() {
      const container = document.getElementById("checklistContainer");
      container.innerHTML = "";

      if (!categories.length) {
        container.innerHTML = `<div class="empty">No project loaded. Create one or import a JSON file.</div>`;
        return;
      }

      categories.forEach((category, cIndex) => {
        const categoryWrap = document.createElement("div");
        categoryWrap.className = "category";

        // Category header
        const header = document.createElement("div");
        header.className = "category-header";

        const title = document.createElement("div");
        title.className = "category-title";
        title.textContent = category.name;

        const completedCount = category.items.filter(i => i.checked).length;
        const progress = document.createElement("div");
        progress.className = "category-progress";
        progress.textContent = `${completedCount}/${category.items.length}`;

        header.appendChild(title);
        header.appendChild(progress);
        categoryWrap.appendChild(header);

        // Progress bar
        const progressContainer = document.createElement("div");
        const progressBar = document.createElement("div");
        progressBar.className = "progress-bar";
        const progressFill = document.createElement("div");
        progressFill.className = "progress-fill";
        const percent = category.items.length > 0 ? (completedCount / category.items.length) * 100 : 0;
        progressFill.style.width = percent + "%";
        progressBar.appendChild(progressFill);
        progressContainer.appendChild(progressBar);
        categoryWrap.appendChild(progressContainer);

        // Items container
        const itemsContainer = document.createElement("div");
        itemsContainer.className = "category-items";

        if (!category.items.length) {
          itemsContainer.innerHTML = `<div class="empty">No tasks in this category.</div>`;
        } else {
          category.items.forEach((item, iIndex) => {
            if (searchTerm && !item.name.toLowerCase().includes(searchTerm.toLowerCase())) {
              return;
            }

            const row = document.createElement("div");
            row.className = "item" + (item.checked ? " done" : "");

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.className = "checkbox";
            checkbox.checked = item.checked;
            checkbox.onchange = function () {
              categories[cIndex].items[iIndex].checked = checkbox.checked;
              saveCategories();
              updateAnalytics();
              renderChecklist();
            };

            const content = document.createElement("div");
            content.className = "item-content";

            const name = document.createElement("div");
            name.className = "item-name";
            name.textContent = item.name;
            content.appendChild(name);

            if (item.notes) {
              const notes = document.createElement("div");
              notes.className = "item-notes";
              notes.textContent = "📝 " + item.notes;
              content.appendChild(notes);
            }

            if (item.priority !== 'normal') {
              const priority = document.createElement("div");
              priority.className = "item-priority " + item.priority;
              priority.textContent = item.priority.charAt(0).toUpperCase() + item.priority.slice(1) + " Priority";
              content.appendChild(priority);
            }

            const actions = document.createElement("div");
            actions.className = "item-actions";

            const editButton = document.createElement("button");
            editButton.className = "ghost";
            editButton.textContent = "Edit";
            editButton.onclick = function () {
              const newName = prompt("Edit task:", item.name);
              const trimmed = newName ? newName.trim() : "";
              if (!trimmed) return;
              categories[cIndex].items[iIndex].name = trimmed;
              saveCategories();
              renderChecklist();
            };

            const deleteButton = document.createElement("button");
            deleteButton.className = "danger";
            deleteButton.textContent = "Delete";
            deleteButton.onclick = function () {
              categories[cIndex].items.splice(iIndex, 1);
              saveCategories();
              updateAnalytics();
              renderChecklist();
            };

            actions.appendChild(editButton);
            actions.appendChild(deleteButton);

            row.appendChild(checkbox);
            row.appendChild(content);
            row.appendChild(actions);

            itemsContainer.appendChild(row);
          });
        }

        categoryWrap.appendChild(itemsContainer);
        container.appendChild(categoryWrap);
      });
    }

    document.getElementById("searchBox").addEventListener("input", function (e) {
      searchTerm = e.target.value;
      renderChecklist();
    });

    document.getElementById("exportButton").onclick = function () {
      const totalItems = categories.reduce((sum, c) => sum + c.items.length, 0);
      
      if (!categories.length || !totalItems) {
        alert("No tasks to export.");
        return;
      }

      const data = { branches: categories };
      downloadJSON("project.json", data);
    };

    categories = loadCategories();
    renderChecklist();
    updateAnalytics();
  </script>
</body>
</html>
